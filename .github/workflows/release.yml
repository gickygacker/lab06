name: Build and Release Packages

permissions:
  contents: write


on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y rpm
    - name: Configure CMake
      run: cmake -S . -B _build
    - name: Build
      run: cmake --build _build
    - name: Create Packages (DEB, RPM, TGZ)
      working-directory: _build
      run: |
        cpack -G DEB
        cpack -G RPM
        cpack -G TGZ
    - name: Upload Linux Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-packages
        path: |
          _build/*.deb
          _build/*.rpm
          _build/*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure CMake
      run: cmake -S . -B _build
    - name: Build
      run: cmake --build _build
    - name: Create Package (DMG)
      working-directory: _build
      run: cpack -G DragNDrop
    - name: Upload macOS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-packages
        path: _build/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure CMake
      run: cmake -S . -B _build
    - name: Build
      run: cmake --build _build --config Release
    - name: Create Packages (MSI, ZIP)
      working-directory: _build
      run: |
        cpack -G WIX
        cpack -G ZIP
    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-packages
        path: |
          _build/*.msi
          _build/*.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: linux-packages
        path: linux-packages

    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: macos-packages
        path: macos-packages

    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: windows-packages
        path: windows-packages

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          linux-packages/*.deb
          linux-packages/*.rpm
          linux-packages/*.tar.gz
          macos-packages/*.dmg
          windows-packages/*.msi
          windows-packages/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
