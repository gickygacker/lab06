name: Build and Release Packages

permissions:
  contents: write


on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y rpm
    - name: Configure CMake
      run: cmake -S . -B _build
    - name: Build
      run: cmake --build _build
    - name: Create Binary Packages (DEB, RPM)
      run: |
        cpack -G DEB --config _build/CPackConfig.cmake
        cpack -G RPM --config _build/CPackConfig.cmake
    - name: Create Source Archive (TAR.GZ)
      run: cpack -G TGZ --config _build/CPackSourceConfig.cmake
    - name: Debug - check files
      run: ls -la *.deb *.rpm *.tar.gz || true
    - name: Upload Linux Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-packages
        path: |
          "*.deb"
          "*.rpm"
          "*.tar.gz"

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure CMake
      run: cmake -S . -B _build
    - name: Build
      run: cmake --build _build
    - name: Create Binary Package (DMG)
      run: cpack -G DragNDrop --config _build/CPackConfig.cmake
    - name: Debug - check files
      run: ls -la *.dmg || true
    - name: Upload macOS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-packages
        path: "*.dmg"

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure CMake
      run: cmake -S . -B _build
    - name: Build
      run: cmake --build _build --config Release
    - name: Create Binary Package (MSI) and Archive (ZIP)
      run: |
        cpack -G WIX --config _build/CPackConfig.cmake
        cpack -G ZIP --config _build/CPackSourceConfig.cmake
    - name: Debug - check files
      run: dir *.msi *.zip || true
    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-packages
        path: |
          "*.msi"
          "*.zip"

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: linux-packages
        path: linux-packages

    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: macos-packages
        path: macos-packages

    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: windows-packages
        path: windows-packages

    - name: Debug - check downloaded files
      run: |
        ls -la linux-packages/ || true
        ls -la macos-packages/ || true
        ls -la windows-packages/ || true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          linux-packages/*.deb
          linux-packages/*.rpm
          linux-packages/*.tar.gz
          macos-packages/*.dmg
          windows-packages/*.msi
          windows-packages/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
